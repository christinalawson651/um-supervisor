# Render Blueprint — deploys the UM Supervisor Dashboard as a static site.
# Assumes THIS folder (um-supervisor) is the repo root.
services:
  - type: web
    name: um-supervisor
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/um-supervisor/browser
    # SPA fallback: serve index.html for any path so client-side routing works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
